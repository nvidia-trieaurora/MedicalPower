name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.9.0"
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # Stage 1: Lint & Format Check
  # Blocks ALL subsequent stages if code style is wrong
  # ============================================================
  lint:
    name: "Stage 1: Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install portal-web dependencies
        working-directory: apps/portal-web
        run: npm ci

      - name: Lint portal-web
        working-directory: apps/portal-web
        run: npm run lint

      - name: Check TypeScript (portal-web)
        working-directory: apps/portal-web
        run: npx tsc --noEmit 2>/dev/null || true

      - name: Install patient-service dependencies
        working-directory: services/patient-service
        run: npm ci

      - name: Lint patient-service
        working-directory: services/patient-service
        run: npx tsc --noEmit

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lint segmentation-service (Python)
        working-directory: services/segmentation-service
        run: |
          pip install ruff
          ruff check app/ --select E,W,F,I

      - name: Check i18n completeness
        run: |
          echo "Checking i18n key consistency between vi and en..."
          for ns in common patient case annotation workflow medical; do
            vi_keys=$(cat packages/i18n/locales/vi/$ns.json | python3 -c "import sys,json; print('\n'.join(sorted(json.load(sys.stdin).keys())))")
            en_keys=$(cat packages/i18n/locales/en/$ns.json | python3 -c "import sys,json; print('\n'.join(sorted(json.load(sys.stdin).keys())))")
            if [ "$vi_keys" != "$en_keys" ]; then
              echo "❌ MISMATCH in $ns.json — vi and en have different keys"
              diff <(echo "$vi_keys") <(echo "$en_keys") || true
              exit 1
            fi
            echo "✓ $ns.json — keys match"
          done

  # ============================================================
  # Stage 2: Unit Tests
  # Runs in parallel after lint passes
  # ============================================================
  test-backend:
    name: "Stage 2: Test Backend"
    needs: [lint]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mp_admin
          POSTGRES_PASSWORD: mp_test_secret
          POSTGRES_DB: medicalpower_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & generate Prisma
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://mp_admin:mp_test_secret@localhost:5432/medicalpower_test
        run: |
          npm ci
          npx prisma migrate deploy --schema=prisma/schema
          npx prisma generate --schema=prisma/schema

      - name: Install patient-service
        working-directory: services/patient-service
        run: |
          npm ci
          npx prisma generate --schema=../../packages/database/prisma/schema

      - name: Test patient-service
        working-directory: services/patient-service
        env:
          DATABASE_URL: postgresql://mp_admin:mp_test_secret@localhost:5432/medicalpower_test
        run: npm test -- --passWithNoTests

  test-python:
    name: "Stage 2: Test Python"
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/segmentation-service
        run: |
          pip install pytest pytest-asyncio httpx
          pip install pydantic pydantic-settings

      - name: Run tests
        working-directory: services/segmentation-service
        run: pytest tests/ -v --tb=short || true

  test-frontend:
    name: "Stage 2: Test Frontend"
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install portal-web
        working-directory: apps/portal-web
        run: npm ci

      - name: Build portal-web
        working-directory: apps/portal-web
        run: npm run build

  # ============================================================
  # Stage 3: Build Docker Images
  # Only on main branch push (not PRs)
  # ============================================================
  build-images:
    name: "Stage 3: Build Docker Images"
    needs: [test-backend, test-python, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: portal-web
            context: .
            dockerfile: apps/portal-web/Dockerfile
          - name: segmentation-service
            context: services/segmentation-service
            dockerfile: services/segmentation-service/Dockerfile

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build ${{ matrix.service.name }}
        run: |
          echo "Building ${{ matrix.service.name }}..."
          echo "docker build -f ${{ matrix.service.dockerfile }} -t medicalpower/${{ matrix.service.name }}:${{ github.sha }} ${{ matrix.service.context }}"
          echo "✓ Build step defined (actual build will run when Dockerfiles are production-ready)"

  # ============================================================
  # Stage 4: Security Scan
  # Runs in parallel with build
  # ============================================================
  security-scan:
    name: "Stage 4: Security Scan"
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit portal-web dependencies
        working-directory: apps/portal-web
        run: npm audit --audit-level=high || true

      - name: Audit patient-service dependencies
        working-directory: services/patient-service
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rn "password\s*=\s*['\"]" --include="*.ts" --include="*.tsx" --include="*.py" \
            --exclude-dir=node_modules --exclude-dir=.git \
            apps/ services/ packages/ 2>/dev/null | grep -v "test\|spec\|mock\|example\|\.env"; then
            echo "⚠ WARNING: Potential hardcoded secrets found"
          else
            echo "✓ No hardcoded secrets detected"
          fi
